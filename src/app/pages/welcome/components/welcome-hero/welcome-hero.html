<section
	class="hero"
	[class.hero--fallback]="!hasHeroImage()"
	id="inicio"
	aria-labelledby="hero-title"
>
	<div class="hero__media" aria-hidden="true">
		<img
			class="hero__image"
			[src]="heroImageSrc"
			alt=""
			(error)="onHeroImageError()"
		/>
		<div class="hero__veil"></div>
	</div>

	<div class="hero__frame">
		<div class="hero__inner">
			<p class="eyebrow">Escuela Bíblica Morando en Sion</p>
			<h1 id="hero-title">"Lo que comenzamos lo terminamos"</h1>
			<p class="hero__lede">
				Un espacio para crecer en la Palabra, fortalecer la comunidad y preparar a cada
				estudiante para servir con excelencia.
			</p>

			<div class="hero__actions">
				<a class="button button--primary" href="#programas">Ver programas</a>
				<a class="button button--secondary" href="#contacto">Contáctanos</a>
			</div>
		</div>
	</div>
</section>
