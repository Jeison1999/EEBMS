<section class="section section--contact" id="contacto">
	<div class="section__heading">
		<p class="eyebrow">Contacto</p>
		<h2>Estamos listos para responder tus preguntas y acompañarte</h2>
	</div>

	<div class="contact-box">
		<p>Escríbenos para solicitar información sobre inscripciones, horarios, programas o reuniones.</p>

		<div class="contact-icons" aria-label="Medios de comunicación">
			@for (icon of icons; track icon.name) {
				<img
					class="contact-icons__icon"
					[src]="icon.src"
					[alt]="icon.name"
				/>	
			}
		</div>
	</div>
</section>
